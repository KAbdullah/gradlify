server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5433/gradify
spring.datasource.username=gradify
spring.datasource.password=gradify


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.root=INFO
logging.level.com.example.backend=DEBUG


logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
gradify.encryption.key=${GRADIFY_ENCRYPTION_KEY:GradifyDefaultEncKey2026}

# Grading CSV temp files: purge registry entries older than this (hours)
gradify.grading.csv-max-age-hours=24
# How often to run purge (ms); default 1 hour
gradify.grading.csv-cleanup-interval-ms=3600000

