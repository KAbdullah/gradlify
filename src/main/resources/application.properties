server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5433/gradifydb
spring.datasource.username=gradify
spring.datasource.password=gradify


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.root=INFO
logging.level.com.example.backend=DEBUG


logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
gradify.encryption.key=${GRADIFY_ENCRYPTION_KEY:GradifyDefaultEncKey2026}

